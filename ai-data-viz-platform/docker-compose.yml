
services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # In Docker, the client runs on the host browser, so it accesses the API on localhost:5005
      - NEXT_PUBLIC_API_URL=http://localhost:5005/api
    depends_on:
      - server
    networks:
      - app-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      # Docker uses the service name "mongo" instead of localhost for container-to-container traffic
      - MONGO_URI=mongodb://mongo:27017/ai-data-viz
      - JWT_SECRET=supersecretjwt_12345
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - mongo
    networks:
      - app-network

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo_data:
