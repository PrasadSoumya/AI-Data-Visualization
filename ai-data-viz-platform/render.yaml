services:
  - type: web
    name: ai-data-viz-platform-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 5005
      - key: ENABLE_MONGODB
        value: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
